# Traefik dynamic config for mcp.example.com
# Deploy to: /data/coolify/proxy/dynamic/nobrainr.yaml
#
# HTTPS for proper TLS cert, but locked to VPN IPs only.
# Path-based routing: /api, /sse, /messages → backend; everything else → dashboard.

http:
  middlewares:
    vpn-only:
      ipAllowList:
        sourceRange:
          - "10.0.0.0/24"
          - "127.0.0.1/32"

    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

  routers:
    # HTTP → HTTPS redirect
    nobrainr-http:
      rule: "Host(`mcp.example.com`)"
      entryPoints:
        - http
      middlewares:
        - redirect-to-https
      service: noop@internal

    # API + MCP routes (higher priority)
    nobrainr-api:
      rule: "Host(`mcp.example.com`) && (PathPrefix(`/api`) || PathPrefix(`/sse`) || PathPrefix(`/messages`))"
      entryPoints:
        - https
      middlewares:
        - vpn-only
      service: nobrainr-backend
      tls:
        certResolver: letsencrypt
      priority: 100

    # Dashboard catch-all (lower priority)
    nobrainr-dashboard:
      rule: "Host(`mcp.example.com`)"
      entryPoints:
        - https
      middlewares:
        - vpn-only
      service: nobrainr-frontend
      tls:
        certResolver: letsencrypt
      priority: 1

  services:
    nobrainr-backend:
      loadBalancer:
        servers:
          - url: "http://nobrainr:8420"

    nobrainr-frontend:
      loadBalancer:
        servers:
          - url: "http://brain-dashboard:80"

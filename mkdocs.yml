site_name: nobrainr
site_description: Persistent memory and knowledge graph for AI agents via MCP
site_url: https://vicquick.github.io/nobrainr
repo_url: https://github.com/vicquick/nobrainr
repo_name: vicquick/nobrainr

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - MCP Tools: mcp-tools.md
  - Client Setup: client-setup.md
  - Autonomous Learning: autonomous-learning.md
  - Deployment: deployment.md
  - API Reference: api-reference.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
